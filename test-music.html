<!DOCTYPE html>
<html>
<head>
    <title>Test YouTube Music System</title>
</head>
<body>
    <h1>Quick YouTube Music Test</h1>
    <p>Test your YouTube API key directly:</p>

    <script>
        // Test your YouTube API key
        const API_KEY = 'AIzaSyAnIaqX86d9r-PCNdzTwpe64dWAq60zRbY';
        const testQuery = 'electronic music';

        fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&q=${testQuery}&key=${API_KEY}&maxResults=5`)
            .then(response => response.json())
            .then(data => {
                console.log('YouTube API Response:', data);
                if (data.items && data.items.length > 0) {
                    console.log('✅ YouTube API working! Found videos:', data.items.map(item => item.snippet.title));

                    // Create a test YouTube player
                    const videoId = data.items[0].id.videoId;
                    const iframe = document.createElement('iframe');
                    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                    iframe.width = '560';
                    iframe.height = '315';
                    iframe.allow = 'autoplay';
                    document.body.appendChild(iframe);

                    const p = document.createElement('p');
                    p.innerHTML = `🎵 Playing: ${data.items[0].snippet.title}`;
                    document.body.appendChild(p);
                } else {
                    console.log('❌ No videos found');
                }
            })
            .catch(error => {
                console.error('❌ YouTube API Error:', error);
            });
    </script>
</body>
</html>
