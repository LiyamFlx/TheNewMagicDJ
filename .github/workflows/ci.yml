---
name: CI/CD

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:  #  allows manual triggers from GitHub UI or gh cli
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint --if-present
      - name: TypeScript check
        run: npm run typecheck --if-present
      - name: Security audit
        run: npm audit --audit-level=moderate || true
      - name: Run tests
        run: npm test --if-present
      - name: Build project
        run: npm run build
  qa:
    needs: build
      - name: Run QA checks
        run: echo "Insert QA checks here"
  deploy-preview:
    needs: [build, qa]
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Preview deploy to Vercel
        run: vercel deploy --prebuilt --token $VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  deploy-production:
    if: github.ref == 'refs/heads/main'
      - name: Pull Vercel environment variables
        run: vercel env pull .env.local --yes
      - name: Deploy to Vercel (Production)
        run: vercel deploy --prod --yes --token $VERCEL_TOKEN
name: CI/CD QA Validation
    branches: ["main", "develop"]
  workflow_dispatch:
  qa-validation:
    name: QA Validation Tests
    timeout-minutes: 30
          node-version: '18'
      - name: ♻ Cache Playwright
        uses: actions/cache@v3
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        run: npm run typecheck
      - name: Build application
      - name: Install Playwright browsers
        run: npm run test:install
      - name: Install Playwright system dependencies
        run: npm run test:install-deps
      - name: Run QA Validation Tests
        run: npm run test:qa
          # Vercel deployment protection bypass
          VERCEL_URL: ${{ vars.VERCEL_URL || 'https://the-new-magic-dj.vercel.app' }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          # Optional API keys for enhanced testing
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          VITA_SPOTIFY_CLIENT_ID: ${{ secrets.VITA_SPOTIFY_CLIENT_ID }}
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
          name: qa-validation-results
          path: |
            test-results/
            playwright-report/
            playwright-report.json
          retention-days: 7
      - name: Upload HTML report
          name: playwright-html-report
          path: playwright-report/
      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
          script: |
            const fs = require('fs');
            let reportContent = '##  QA Validation Results\n\n';
            try {
              if (fs.existsSync('playwright-report.json')) {
                const report = JSON.parse(fs.readFileSync('playwright-report.json', 'utf8'));
                const stats = report.stats || {};
                reportContent += `### Test Summary\n`;
                reportContent += `-  **Passed:** ${stats.passed || 0}\n`;
                reportContent += `- ❌ **Failed:** ${stats.failed || 0}\n`;
                reportContent += `- ⏭ **Skipped:** ${stats.skipped || 0}\n`;
                reportContent += `- ⏱ **Duration:** ${stats.duration || 'N/A'}\n\n`;
                if (stats.failed > 0) {
                  reportContent += `### ⚠ Critical Issues Detected\n`;
                  reportContent += `${stats.failed} test(s) failed. Please review the detailed report.\n\n`;
                } else {
                  reportContent += `### ✨ All Quality Gates Passed\n`;
                  reportContent += `All 10 critical quality gates are functioning correctly:\n`;
                  reportContent += `- CORS & External Resources\n`;
                  reportContent += `- React & Runtime Stability\n`;
                  reportContent += `- Degraded / Demo Mode\n`;
                  reportContent += `- Audio Playback\n`;
                  reportContent += `- User Experience Flow\n`;
                  reportContent += `- API Health Checks\n`;
                  reportContent += `- Performance Validation\n`;
                  reportContent += `- Deployment Protection\n`;
                  reportContent += `- Security Validation\n`;
                  reportContent += `- Regression Guardrails\n\n`;
                }
              } else {
                reportContent += `⚠ Test report not found. Check workflow logs for details.\n\n`;
              }
              reportContent += `###  View Detailed Reports\n`;
              reportContent += `Download the \`qa-validation-results\` artifact for detailed test outputs.\n`;
            } catch (error) {
              reportContent += `⚠ Error parsing test results: ${error.message}\n\n`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportContent
            });
  deployment-validation:
    name: Deployment Validation
    needs: qa-validation
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
      - name: Post-deployment validation
        run: |
          echo " Deployment completed successfully!"
          echo "🔗 Production URL: https://the-new-magic-dj.vercel.app"
          echo " QA validation ensures all critical systems are operational"
name: Vercel Deploy
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' }}
      - uses: actions/checkout@v4
      - name: Setup Node
      - run: npm ci
      - name: Build
          working-directory: ./
          prod: true
