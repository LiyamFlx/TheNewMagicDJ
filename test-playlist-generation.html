<!DOCTYPE html>
<html>
<head>
    <title>MagicDJ Playlist Generation Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 20px;
            background: #0f0f23;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .test-section {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-left-color: #22c55e;
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-left-color: #ef4444;
        }
        .warning {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border-left-color: #fbbf24;
        }
        .info {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-left-color: #3b82f6;
        }
        h1 { color: #a855f7; margin-bottom: 30px; }
        h2 { color: #e879f9; margin-bottom: 15px; }
        .btn {
            background: linear-gradient(45deg, #8b5cf6, #a855f7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .test-controls {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .vibe-selector {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .vibe-btn {
            padding: 8px 16px;
            border: 2px solid #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vibe-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }
        .vibe-btn.active {
            background: #8b5cf6;
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #8b5cf6, #a855f7);
            transition: width 0.3s ease;
            width: 0%;
        }
        .track-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }
        .track-item {
            padding: 8px;
            margin: 4px 0;
            background: rgba(139, 92, 246, 0.05);
            border-radius: 4px;
            border-left: 3px solid #8b5cf6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 MagicDJ Playlist Generation Test</h1>

        <div class="test-controls">
            <h3>🎧 Magic Set Generator</h3>
            <p>Select a vibe and energy level to generate a playlist:</p>

            <div>
                <label><strong>Vibe:</strong></label>
                <div class="vibe-selector">
                    <button class="vibe-btn active" data-vibe="Electronic">🎛️ Electronic</button>
                    <button class="vibe-btn" data-vibe="Hip-Hop">🎤 Hip-Hop</button>
                    <button class="vibe-btn" data-vibe="House">🏠 House</button>
                    <button class="vibe-btn" data-vibe="Techno">⚡ Techno</button>
                </div>
            </div>

            <div>
                <label><strong>Energy Level:</strong></label>
                <div class="vibe-selector">
                    <button class="vibe-btn" data-energy="low">😌 Low</button>
                    <button class="vibe-btn active" data-energy="medium">😊 Medium</button>
                    <button class="vibe-btn" data-energy="high">🚀 High</button>
                </div>
            </div>

            <div>
                <button class="btn" onclick="generateMagicSet()" id="generateBtn">
                    🎵 Generate Magic Set
                </button>
                <button class="btn" onclick="generateMagicMatch()" id="matchBtn">
                    🎯 Generate Magic Match
                </button>
                <button class="btn" onclick="clearResults()">🗑️ Clear Results</button>
            </div>

            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="test-section">
            <h2>📊 Test Results</h2>
            <div id="results"></div>
        </div>

        <div class="test-section" id="playlistSection" style="display: none;">
            <h2>🎵 Generated Playlist</h2>
            <div id="playlistInfo"></div>
            <div class="track-list" id="trackList"></div>
        </div>

        <div class="test-section">
            <h2>📋 API Response Details</h2>
            <div id="apiDetails"></div>
        </div>
    </div>

    <script>
        let selectedVibe = 'Electronic';
        let selectedEnergy = 'medium';
        let results = [];

        // Handle vibe and energy selection
        document.querySelectorAll('.vibe-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const vibe = this.dataset.vibe;
                const energy = this.dataset.energy;

                if (vibe) {
                    document.querySelectorAll('[data-vibe]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedVibe = vibe;
                }

                if (energy) {
                    document.querySelectorAll('[data-energy]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedEnergy = energy;
                }
            });
        });

        function addResult(message, type = 'info', details = null) {
            const timestamp = new Date().toLocaleTimeString();
            const result = { message, type, details, timestamp };
            results.push(result);
            updateResultsDisplay();
        }

        function updateResultsDisplay() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = results.map(result => `
                <div class="result ${result.type}">
                    <div>[${result.timestamp}] ${result.message}</div>
                    ${result.details ? `<pre>${JSON.stringify(result.details, null, 2)}</pre>` : ''}
                </div>
            `).join('');
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        function clearResults() {
            results = [];
            updateResultsDisplay();
            document.getElementById('apiDetails').innerHTML = '';
            document.getElementById('playlistSection').style.display = 'none';
        }

        function setProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');

            if (percent === 0) {
                progressBar.style.display = 'none';
            } else {
                progressBar.style.display = 'block';
                progressFill.style.width = percent + '%';
            }
        }

        function setButtonsEnabled(enabled) {
            document.getElementById('generateBtn').disabled = !enabled;
            document.getElementById('matchBtn').disabled = !enabled;
        }

        async function generateMagicSet() {
            addResult(`🎵 Generating Magic Set playlist: ${selectedVibe} (${selectedEnergy} energy)...`, 'info');
            setButtonsEnabled(false);
            setProgress(10);

            try {
                setProgress(30);

                const response = await fetch('/api/generate-magic-set', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        vibe: selectedVibe,
                        energyLevel: selectedEnergy,
                        trackCount: 8
                    }),
                });

                setProgress(70);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`API Error ${response.status}: ${errorData.error?.message || response.statusText}`);
                }

                const playlist = await response.json();
                setProgress(100);

                addResult(`✅ Magic Set generated successfully!`, 'success', {
                    trackCount: playlist.tracks?.length || 0,
                    totalDuration: Math.round((playlist.total_duration || 0) / 60) + ' minutes',
                    name: playlist.name
                });

                displayPlaylist(playlist);

                // Show API response details
                document.getElementById('apiDetails').innerHTML = `
                    <h3>API Response:</h3>
                    <pre>${JSON.stringify(playlist, null, 2)}</pre>
                `;

                setTimeout(() => setProgress(0), 1000);

            } catch (error) {
                addResult(`❌ Magic Set generation failed: ${error.message}`, 'error', { error: error.toString() });
                setProgress(0);
            } finally {
                setButtonsEnabled(true);
            }
        }

        async function generateMagicMatch() {
            addResult(`🎯 Generating Magic Match playlist...`, 'info');
            setButtonsEnabled(false);
            setProgress(10);

            try {
                setProgress(30);

                // For now, we'll test by calling the simple playlist service with demo data
                // In a real scenario, this would include audio fingerprint data
                const response = await fetch('/api/generate-magic-set', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        vibe: 'Electronic',
                        energyLevel: 'medium',
                        trackCount: 8
                    }),
                });

                setProgress(70);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`API Error ${response.status}: ${errorData.error?.message || response.statusText}`);
                }

                const playlist = await response.json();

                // Modify for Magic Match presentation
                playlist.id = `magic-match-${Date.now()}`;
                playlist.name = 'Magic Match: Demo Track';
                playlist.description = 'AI-curated playlist based on audio recognition (demo mode)';

                setProgress(100);

                addResult(`✅ Magic Match generated successfully!`, 'success', {
                    trackCount: playlist.tracks?.length || 0,
                    totalDuration: Math.round((playlist.total_duration || 0) / 60) + ' minutes',
                    name: playlist.name
                });

                displayPlaylist(playlist);

                setTimeout(() => setProgress(0), 1000);

            } catch (error) {
                addResult(`❌ Magic Match generation failed: ${error.message}`, 'error', { error: error.toString() });
                setProgress(0);
            } finally {
                setButtonsEnabled(true);
            }
        }

        function displayPlaylist(playlist) {
            const playlistSection = document.getElementById('playlistSection');
            const playlistInfo = document.getElementById('playlistInfo');
            const trackList = document.getElementById('trackList');

            playlistInfo.innerHTML = `
                <div class="result info">
                    <strong>📀 ${playlist.name}</strong><br>
                    📝 ${playlist.description}<br>
                    🎵 ${playlist.tracks?.length || 0} tracks<br>
                    ⏱️ ${Math.round((playlist.total_duration || 0) / 60)} minutes<br>
                    🆔 ${playlist.id}
                </div>
            `;

            if (playlist.tracks && playlist.tracks.length > 0) {
                trackList.innerHTML = playlist.tracks.map((track, index) => `
                    <div class="track-item">
                        <strong>${index + 1}. ${track.title}</strong><br>
                        <small>🎤 ${track.artist} • 💿 ${track.album || 'Unknown Album'} • ⏱️ ${Math.floor((track.duration || 0) / 60)}:${String((track.duration || 0) % 60).padStart(2, '0')}</small>
                        ${track.youtube_id ? `<br><small>🎬 YouTube: ${track.youtube_id}</small>` : ''}
                        ${track.spotify_id ? `<br><small>🎵 Spotify: ${track.spotify_id}</small>` : ''}
                    </div>
                `).join('');
            } else {
                trackList.innerHTML = '<div class="result warning">No tracks found in playlist</div>';
            }

            playlistSection.style.display = 'block';
        }

        // Initialize the page
        window.onload = function() {
            addResult('🚀 Playlist Generation Test Ready!', 'info');
            addResult('Select vibe and energy level, then click "Generate Magic Set" to test playlist generation.', 'info');
        };
    </script>
</body>
</html>
