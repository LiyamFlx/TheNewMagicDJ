<!DOCTYPE html>
<html>
<head>
    <title>Auth Test - Local</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <h1>Authentication Flow Test - Local Development</h1>
    <div id="results"></div>

    <script>
        async function testAuthFlow() {
            const resultsDiv = document.getElementById('results');

            function addResult(message, type = 'loading') {
                const div = document.createElement('div');
                div.className = `result ${type}`;
                div.textContent = message;
                resultsDiv.appendChild(div);
                return div;
            }

            // Test 1: Check if page loads
            const loadingTest = addResult('Testing if homepage loads...');
            try {
                const response = await fetch('http://localhost:5176/');
                if (response.ok) {
                    const html = await response.text();

                    // Check for authentication elements
                    if (html.includes('Sign In') || html.includes('Sign Up')) {
                        loadingTest.className = 'result success';
                        loadingTest.textContent = '✅ Homepage loads and contains authentication buttons';
                    } else if (html.includes('MagicDJ') || html.includes('AI-Powered')) {
                        loadingTest.className = 'result success';
                        loadingTest.textContent = '✅ Homepage loads successfully (checking for auth modal trigger)';
                    } else {
                        loadingTest.className = 'result error';
                        loadingTest.textContent = '❌ Homepage loads but missing expected content';
                    }

                    // Test 2: Check for React app mounting
                    if (html.includes('id="root"')) {
                        addResult('✅ React root element found', 'success');
                    } else {
                        addResult('❌ React root element missing', 'error');
                    }

                    // Test 3: Check for authentication modal components
                    if (html.includes('AuthModal') || html.includes('Login') || html.includes('signin')) {
                        addResult('✅ Authentication components detected', 'success');
                    } else {
                        addResult('⚠️ Authentication components not immediately visible (may load dynamically)', 'loading');
                    }

                } else {
                    loadingTest.className = 'result error';
                    loadingTest.textContent = `❌ Homepage failed to load: ${response.status} ${response.statusText}`;
                }
            } catch (error) {
                loadingTest.className = 'result error';
                loadingTest.textContent = `❌ Failed to connect to local server: ${error.message}`;
            }

            // Test 4: Check environment variables in browser
            const envTest = addResult('Testing Supabase environment variables...');
            try {
                // This would be available in the browser console if properly configured
                envTest.className = 'result success';
                envTest.textContent = '✅ Environment test completed (check browser console for Supabase config)';
            } catch (error) {
                envTest.className = 'result error';
                envTest.textContent = `❌ Environment variable test failed: ${error.message}`;
            }
        }

        // Run tests when page loads
        window.onload = testAuthFlow;
    </script>
</body>
</html>
